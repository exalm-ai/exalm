name: release

# Cut a release when a v* tag is pushed. GoReleaser builds multi-platform
# binaries + checksums and creates a DRAFT GitHub Release for maintainer review.
# (The container image is published separately by docker-image.yml, which also
# triggers on v* tags.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags so changelog/version are correct
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
