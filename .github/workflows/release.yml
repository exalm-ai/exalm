name: release

# Cut a release when a v* tag is pushed. GoReleaser builds multi-platform
# binaries + checksums and creates a DRAFT GitHub Release for maintainer review.
# (The container image is published separately by docker-image.yml, which also
# triggers on v* tags.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags so changelog/version are correct
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26"
          cache: true
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
