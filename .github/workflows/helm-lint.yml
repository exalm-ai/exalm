name: helm-lint

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-lint.yml"
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-lint.yml"

jobs:
  lint:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.14.4

      - name: helm lint
        run: helm lint deploy/helm/exalm-agent

      - name: helm template — default (ollama, no key)
        run: helm template test deploy/helm/exalm-agent --debug

      - name: helm template — claude with inline secret
        run: |
          helm template test deploy/helm/exalm-agent \
            --set llm.provider=claude \
            --set llm.apiKey=sk-ant-EXAMPLE \
            --debug

      - name: helm template — openrouter
        run: |
          helm template test deploy/helm/exalm-agent \
            --set llm.provider=openrouter \
            --set llm.model=qwen/qwen-2.5-0.5b-instruct \
            --set llm.apiKey=sk-or-EXAMPLE \
            --debug

      - name: helm template — openai with existing secret
        run: |
          helm template test deploy/helm/exalm-agent \
            --set llm.provider=openai \
            --set llm.existingSecret=my-pre-existing-secret \
            --debug

      - name: helm template — allowApply on
        run: |
          helm template test deploy/helm/exalm-agent \
            --set rbac.allowApply=true \
            --debug

      - name: helm template — SLO via ConfigMap + Prometheus
        run: |
          helm template test deploy/helm/exalm-agent \
            --set slo.enabled=true \
            --set slo.specConfigMap=my-slo-specs \
            --set slo.prometheusURL=http://prometheus:9090 \
            --debug

      - name: helm template — Ingress
        run: |
          helm template test deploy/helm/exalm-agent \
            --set ingress.enabled=true \
            --set "ingress.hosts[0].host=exalm.example.com" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --debug

      - name: helm template — persistence enabled (default)
        run: |
          helm template test deploy/helm/exalm-agent \
            --set persistence.enabled=true \
            --debug

      - name: helm template — persistence disabled
        run: |
          helm template test deploy/helm/exalm-agent \
            --set persistence.enabled=false \
            --debug

      - name: helm template — existing PVC
        run: |
          helm template test deploy/helm/exalm-agent \
            --set persistence.existingClaim=my-existing-pvc \
            --debug

      - name: helm template — dashboard auth token
        run: |
          helm template test deploy/helm/exalm-agent \
            --set dashboard.token=mysecrettoken \
            --debug 2>/dev/null || true  # token flag is future; skip gracefully

      - name: helm template — invalid provider fails fast
        run: |
          if helm template test deploy/helm/exalm-agent --set llm.provider=hallucinated 2>/dev/null; then
            echo "ERROR: invalid provider should have failed the template render"
            exit 1
          fi
          echo "✓ invalid provider correctly rejected"

  package:
    name: package + lint package
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.14.4

      - name: helm package
        run: |
          mkdir -p ./out
          helm package deploy/helm/exalm-agent --destination ./out
          ls -la ./out

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: exalm-agent-chart
          path: ./out/exalm-agent-*.tgz
          retention-days: 7
