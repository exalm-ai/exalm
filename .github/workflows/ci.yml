name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Format check
        run: |
          fmt_out=$(gofmt -s -l .)
          if [ -n "$fmt_out" ]; then
            echo "Files need formatting:"
            echo "$fmt_out"
            exit 1
          fi
      - name: Test with race detector
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Coverage gate (55% minimum; aspirational target 60%)
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          # Gate is 55% — current baseline is 55.3%.
          # Raise to 60% once low-coverage packages (web, slo, k8s, tui) are hardened.
          if [ "$(echo "${total} < 55" | bc -l)" = "1" ]; then
            echo "Coverage ${total}% is below the 55% minimum threshold."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          args: --timeout=5m

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Pin to the PR head SHA (or push SHA) to avoid the transient
          # merge-commit SHA becoming inaccessible between jobs.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: make build
      - name: Smoke test
        run: ./bin/exalm --help
