{{- include "exalm-agent.validateProvider" . -}}
{{/*
Create a Secret ONLY when:
  - the chosen provider needs an API key (claude / openai / openrouter), AND
  - llm.apiKey is non-empty (the user provided one inline), AND
  - llm.existingSecret is empty (the user is NOT pointing at a pre-existing one).
Otherwise we either reference the existingSecret or skip the secret entirely
(ollama provider has no API key).
*/}}
{{- $needsKey := has .Values.llm.provider (list "claude" "openai" "openrouter") -}}
{{- if and $needsKey .Values.llm.apiKey (not .Values.llm.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "exalm-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "exalm-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "exalm-agent.providerSecretKey" . }}: {{ .Values.llm.apiKey | quote }}
{{- end }}
