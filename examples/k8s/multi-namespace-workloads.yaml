# Exalm multi-namespace test workloads
# Deploys deliberately broken scenarios across 3 namespaces so exalm can
# detect cross-namespace issues, selector mismatches, and more fix scenarios.
#
# Apply with:
#   kubectl apply -f examples/k8s/multi-namespace-workloads.yaml
#
# Clean up:
#   kubectl delete namespace exalm-prod exalm-staging exalm-data

# ── Namespaces ──────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Namespace
metadata:
  name: exalm-prod
  labels:
    purpose: exalm-testing
    env: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: exalm-staging
  labels:
    purpose: exalm-testing
    env: staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: exalm-data
  labels:
    purpose: exalm-testing
    tier: data

# ── exalm-data namespace ─────────────────────────────────────────────────────
# PostgreSQL StatefulSet — PVC will get stuck if no standard StorageClass exists
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: exalm-data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_PASSWORD
          value: "exalm-test-password"
        - name: POSTGRES_DB
          value: "appdb"
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "fast-nvme"   # intentionally wrong — will cause PVC Pending
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: exalm-data
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
# Redis — running fine, used by prod namespace (cross-namespace connectivity test)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: exalm-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: exalm-data
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
# Default-deny egress NetworkPolicy in exalm-data (cross-namespace traffic blocked)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: exalm-data
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS only
  - ports:
    - port: 53
      protocol: UDP

# ── exalm-prod namespace ──────────────────────────────────────────────────────
# 1. API gateway — SELECTOR MISMATCH scenario
#    Service selector says {app: gateway} but deployment uses {app: api-gateway}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: exalm-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway      # <-- pods have this label
  template:
    metadata:
      labels:
        app: api-gateway    # <-- pod label
        version: v2
    spec:
      containers:
      - name: api
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: exalm-prod
spec:
  selector:
    app: gateway           # <-- WRONG: should be "api-gateway" to match deployment pods
  ports:
  - port: 80
    targetPort: 80
---
# 2. Report generator CronJob — SUSPENDED
apiVersion: batch/v1
kind: CronJob
metadata:
  name: report-generator
  namespace: exalm-prod
spec:
  schedule: "0 6 * * *"
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: report
            image: busybox:1.36
            command: ["sh", "-c", "echo 'Generating daily report...'; sleep 10; echo 'Done'"]
            resources:
              requests:
                cpu: "50m"
                memory: "32Mi"
              limits:
                cpu: "200m"
                memory: "64Mi"
          restartPolicy: OnFailure
---
# 3. Frontend deployment — NO RESOURCE LIMITS (triggers BestEffort QoS finding)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: exalm-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: app
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        # Deliberately no resources block → BestEffort QoS
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: exalm-prod
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
---
# 4. Cache warmer — tries to reach exalm-data/redis (cross-namespace connectivity test)
#    Will crash because it can't reach redis across namespaces (no NetworkPolicy allow)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-warmer
  namespace: exalm-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-warmer
  template:
    metadata:
      labels:
        app: cache-warmer
    spec:
      containers:
      - name: warmer
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Starting cache warmer"
          echo "Connecting to redis.exalm-data.svc.cluster.local:6379"
          while true; do
            nc -z -w2 redis.exalm-data.svc.cluster.local 6379 2>&1 || \
              echo "ERROR connection refused: redis.exalm-data.svc.cluster.local:6379 — cross-namespace egress blocked"
            sleep 5
          done
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "50m"
            memory: "32Mi"

# ── exalm-staging namespace ───────────────────────────────────────────────────
# 1. ML inference service — IMAGEPULLBACKOFF (non-existent tag)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference
  namespace: exalm-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-inference
  template:
    metadata:
      labels:
        app: ml-inference
    spec:
      containers:
      - name: model
        image: tensorflow/serving:2.99.99-nonexistent   # bad tag → ImagePullBackOff
        ports:
        - containerPort: 8501
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
# 2. DB migrator — CrashLoopBackOff (DB unreachable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-migrator
  namespace: exalm-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-migrator
  template:
    metadata:
      labels:
        app: db-migrator
    spec:
      containers:
      - name: migrator
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "DB migrator v1.4.2 starting"
          echo "Connecting to postgres.exalm-data.svc.cluster.local:5432"
          echo "ERROR dial tcp 10.96.4.18:5432: connect: connection refused"
          echo "ERROR max retries exceeded, database is unavailable"
          exit 1
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
# 3. Worker — unschedulable (requests too much CPU)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-worker
  namespace: exalm-staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: batch-worker
  template:
    metadata:
      labels:
        app: batch-worker
    spec:
      containers:
      - name: worker
        image: busybox:1.36
        command: ["sleep", "3600"]
        resources:
          requests:
            cpu: "4999m"    # near-impossible to schedule 3 of these
            memory: "1Mi"
          limits:
            cpu: "5000m"
            memory: "2Mi"
---
# 4. Analytics service — liveness probe failure
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: exalm-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
      - name: app
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 2
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
# 5. Suspended data-sync CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: data-sync
  namespace: exalm-staging
spec:
  schedule: "*/15 * * * *"
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: sync
            image: busybox:1.36
            command: ["sh", "-c", "echo 'syncing data...'"]
          restartPolicy: Never
---
# 6. Ghost service (no backing pods) in staging
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
  namespace: exalm-staging
spec:
  selector:
    app: payment-processor   # no pods with this label
  ports:
  - port: 443
    targetPort: 8443
