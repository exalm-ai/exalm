# Exalm test workloads — deploys deliberately broken pods so you can run
# `exalm k8s analyze` against a real cluster and see live findings.
#
# Apply with:
#   kubectl apply -f examples/k8s/test-workloads.yaml
#   kubectl apply -f examples/k8s/test-workloads.yaml -n exalm-test  # if namespace already exists
#
# Clean up:
#   kubectl delete namespace exalm-test
---
apiVersion: v1
kind: Namespace
metadata:
  name: exalm-test
  labels:
    purpose: exalm-testing
---
# 1. CrashLoopBackOff — container exits immediately (exit code 1)
#    Triggers: CrashLoopBackOff finding, log anomaly scanning
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-loop
  namespace: exalm-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crash-loop
  template:
    metadata:
      labels:
        app: crash-loop
    spec:
      containers:
      - name: crash-loop
        image: busybox:1.36
        command: ["sh", "-c", "echo 'starting'; echo 'ERROR dial tcp 10.96.4.18:5432: connect: connection refused'; sleep 2; exit 1"]
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "50m"
            memory: "32Mi"
---
# 2. Probe failure — liveness probe points at a path that returns 500
#    Triggers: probe-failure finding (via Unhealthy events), repeated restart
apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-fail
  namespace: exalm-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: probe-fail
  template:
    metadata:
      labels:
        app: probe-fail
    spec:
      containers:
      - name: app
        # nginx serves 404 on /healthz — liveness probe will fail
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "50m"
            memory: "32Mi"
---
# 3. OOMKilled — stress process allocates more memory than the limit
#    Triggers: OOMKilled finding
#    Note: requires Linux node (won't work on Windows node pools)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-test
  namespace: exalm-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-test
  template:
    metadata:
      labels:
        app: oom-test
    spec:
      containers:
      - name: oom
        image: polinux/stress:latest
        command: ["stress", "--vm", "1", "--vm-bytes", "200M", "--vm-hang", "0"]
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "96Mi"   # stress will exceed this → OOMKill
---
# 4. Pending — requests more CPU than any node can provide
#    Triggers: FailedScheduling finding (scheduling stall)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unschedulable
  namespace: exalm-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unschedulable
  template:
    metadata:
      labels:
        app: unschedulable
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sleep", "3600"]
        resources:
          requests:
            cpu: "9999"      # 9999 cores — no node has this
            memory: "1Mi"
---
# 5. Missing resource limits — triggers BestEffort QoS finding
#    Also: no NetworkPolicy in namespace → NetworkPolicy coverage finding
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-limits
  namespace: exalm-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: no-limits
  template:
    metadata:
      labels:
        app: no-limits
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sleep", "3600"]
        # deliberately no resources block → BestEffort QoS
---
# 6. Suspended CronJob — triggers CronJob suspended finding
apiVersion: batch/v1
kind: CronJob
metadata:
  name: suspended-job
  namespace: exalm-test
spec:
  schedule: "*/5 * * * *"
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: job
            image: busybox:1.36
            command: ["echo", "hello"]
          restartPolicy: Never
---
# 7. Service with no backing pods — triggers Service no-endpoints finding
apiVersion: v1
kind: Service
metadata:
  name: ghost-svc
  namespace: exalm-test
spec:
  selector:
    app: ghost-app   # no pods have this label
  ports:
  - port: 8080
    targetPort: 8080
